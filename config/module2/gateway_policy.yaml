# configs/module2/gateway_policy.yaml
# 【成员 F 专属】API 限流、三态熔断与后备路由策略配置

api_gateway:
  routing_strategy: "circuit_breaker_with_failover" # 策略：熔断+故障转移
  
  # 1. 令牌桶限流配置 (Token Bucket)
  token_bucket:
    capacity: 60              # 桶最大容量（允许的突发并发量）
    refill_rate_per_sec: 10   # 每秒补充的令牌数（QPS 限制）

  # 2. 三态熔断器配置 (Circuit Breaker)
  max_failure_threshold: 3             # 连续失败 3 次触发跳闸进入 Open 状态
  circuit_breaker_cooldown_period: 60  # Open 状态的强行冷却等待时间（秒）
  
  # 3. 指数退避重试配置 (Exponential Backoff)
  exponential_backoff_base_time: 2     # 退避基数（秒）
  max_retry_limit: 5                   # 最大重试次数

# 4. 异构后备路由表 (Failover Profiles)
  failover_routing:
    # --- 主力通道 (Primary) ---
    primary:
      base_url: "https://api.qnaigc.com/v1"
      model_name: "deepseek/deepseek-v4-pro"
      api_key_env_var: "PLATFORM_PRIMARY_LLM_API_KEY"

    # --- 灾备通道 (Backup) ---
    # 设定：当 Claude 彻底失联时，由阿里云的旗舰级 Qwen-Max 接管大脑
    backup:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model_name: "qwen3.7-plus"
      # 复用你已有的 Fast LLM Key，因为它有阿里云的通行证
      api_key_env_var: "PLATFORM_FAST_LLM_API_KEY"