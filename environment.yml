  - _libgcc_mutex=0.1
  - _openmp_mutex=5.1
  - bzip2=1.0.8
  - ca-certificates=2026.5.14
  - ld_impl_linux-64=2.44
  - libexpat=2.8.1
  - libffi=3.4.8
  - libgcc=15.2.0
  - libgcc-ng=15.2.0
  - libstdcxx=15.2.0
  - libuuid=1.41.5
  - libxcb=1.17.0
  - libzlib=1.3.2
  - ncurses=6.5
  - openssl=3.5.7
  - pthread-stubs=0.3
  - python=3.12.13
  - readline=8.3
  - setuptools=82.0.1
  - sqlite=3.53.2
  - tk=8.6.15
  - tzdata=2026b
  - wheel=0.46.3
  - xorg-libx11=1.8.12
